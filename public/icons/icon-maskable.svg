  <g transform="translate(256,256) scale(0.75)" fill="white">
    <polygon points="0,-100 130,0 0,60 -130,0"/>
    <rect x="-18" y="-108" width="36" height="18" rx="4"/>
    <path d="M -130,0 L -130,55 Q -130,75 -110,80 L -50,95 Q -30,100 -20,85 L -20,40 Z" opacity="0.85"/>
    <path d="M 130,0 L 130,55 Q 130,75 110,80 L 50,95 Q 30,100 20,85 L 20,40 Z" opacity="0.85"/>
    <rect x="-6" y="60" width="12" height="70" rx="4" opacity="0.9"/>
    <circle cx="0" cy="140" r="14" opacity="0.9"/>
  </g>
</svg>
